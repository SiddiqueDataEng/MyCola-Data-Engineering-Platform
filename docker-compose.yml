# ─────────────────────────────────────────────────────────────────────
# MyCola Full-Stack Platform
#   - ClickHouse (already running as mycola_clickhouse)
#   - Kafka + Zookeeper
#   - Kafka UI
#   - Airflow (webserver + scheduler)
#   - Kafka → ClickHouse consumer
# ─────────────────────────────────────────────────────────────────────

networks:
  mycola:
    driver: bridge

volumes:
  zookeeper_data:
  kafka_data:
  airflow_db:
  airflow_logs:

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "mycola_secret_2024"
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    AIRFLOW__CORE__PARALLELISM: "4"
    CLICKHOUSE_HOST: host.docker.internal
    CLICKHOUSE_PORT: "9000"
    KAFKA_BOOTSTRAP: "kafka:29092"
    PYTHONPATH: "/opt/airflow/dags:/opt/airflow"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - airflow_db:/opt/airflow
    - ./generated_data:/opt/airflow/generated_data
    - ./platform:/opt/airflow/platform
  networks:
    - mycola
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    - kafka

services:

  # ── Zookeeper ──────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: mycola_zookeeper
    networks: [mycola]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_HEAP_OPTS: "-Xmx256m -Xms128m"
    volumes:
      - zookeeper_data:/var/lib/zookeeper
    restart: unless-stopped

  # ── Kafka Broker ───────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mycola_kafka
    networks: [mycola]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka
    depends_on:
      - zookeeper
    restart: unless-stopped

  # ── Kafka UI ───────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mycola_kafka_ui
    networks: [mycola]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: mycola
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
      KAFKA_CLUSTERS_0_ZOOKEEPER: "zookeeper:2181"
    depends_on:
      - kafka
    restart: unless-stopped

  # ── Kafka → ClickHouse Consumer ────────────────────────────────────
  kafka-consumer:
    build:
      context: ./kafka_consumer
      dockerfile: Dockerfile
    container_name: mycola_kafka_consumer
    networks: [mycola]
    environment:
      KAFKA_BOOTSTRAP: "kafka:29092"
      CLICKHOUSE_HOST: "host.docker.internal"
      CLICKHOUSE_PORT: "9000"
    volumes:
      - ./kafka_consumer:/app
    depends_on:
      - kafka
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Airflow Init ───────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: mycola_airflow_init
    depends_on: []          # override — no kafka dependency for init
    command: >
      bash -c "
        pip install clickhouse-driver kafka-python pandas --quiet &&
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname MyCola --lastname Admin --role Admin --email admin@mycola.local || true
      "
    restart: "no"

  # ── Airflow Webserver ──────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: mycola_airflow_web
    ports:
      - "8081:8080"
    command: webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ──────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: mycola_airflow_scheduler
    command: >
      bash -c "
        pip install clickhouse-driver kafka-python pandas --quiet &&
        airflow scheduler
      "
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
